<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solution - 치료 방법</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div style="
  width: 680px;
  min-height: 560px;
  background: #FFFFFF;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 56px 60px;
  position: relative;
">
  <!-- Top accent -->
  <div style="
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #7435FF, #9B6BFF);
  "></div>

  <!-- Section label -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #7435FF;
    letter-spacing: 2px;
    margin-bottom: 16px;
  ">SOLUTION</p>

  <!-- Headline -->
  <h2 style="
    font-family: 'Noto Serif KR', serif;
    font-size: 26px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.5;
    margin-bottom: 12px;
  ">호르몬 변화에 맞춘<br>한약 처방 프로그램</h2>

  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: #888;
    margin-bottom: 36px;
  ">박지영 원장의 3단계 산후 체형 관리 솔루션</p>

  <!-- Steps -->
  <div style="display: flex; gap: 16px;">

    <!-- Step 1 -->
    <div style="
      flex: 1;
      background: linear-gradient(180deg, #F8F6FF 0%, #FFFFFF 100%);
      border: 1px solid #E8E0FF;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
    ">
      <div style="
        width: 44px;
        height: 44px;
        background: #7435FF;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
      ">
        <span style="color: white; font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700;">1</span>
      </div>
      <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; color: #2E1566; margin-bottom: 8px;">체질 진단</p>
      <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: #888; line-height: 1.6;">
        호르몬 상태<br>
        체질 분석<br>
        산후 회복도<br>
        정밀 진단
      </p>
    </div>

    <!-- Arrow -->
    <div style="display: flex; align-items: center; color: #D0C4FF; font-size: 20px;">▸</div>

    <!-- Step 2 -->
    <div style="
      flex: 1;
      background: linear-gradient(180deg, #F8F6FF 0%, #FFFFFF 100%);
      border: 1px solid #E8E0FF;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
    ">
      <div style="
        width: 44px;
        height: 44px;
        background: #7435FF;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
      ">
        <span style="color: white; font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700;">2</span>
      </div>
      <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; color: #2E1566; margin-bottom: 8px;">맞춤 한약</p>
      <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: #888; line-height: 1.6;">
        호르몬 균형<br>
        기초대사량 회복<br>
        수분 대사 개선<br>
        한약 처방
      </p>
    </div>

    <!-- Arrow -->
    <div style="display: flex; align-items: center; color: #D0C4FF; font-size: 20px;">▸</div>

    <!-- Step 3 -->
    <div style="
      flex: 1;
      background: linear-gradient(180deg, #F8F6FF 0%, #FFFFFF 100%);
      border: 1px solid #E8E0FF;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
    ">
      <div style="
        width: 44px;
        height: 44px;
        background: #7435FF;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
      ">
        <span style="color: white; font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700;">3</span>
      </div>
      <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; color: #2E1566; margin-bottom: 8px;">관리 & 유지</p>
      <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: #888; line-height: 1.6;">
        식이 코칭<br>
        단계별 감량<br>
        요요 방지<br>
        체형 유지
      </p>
    </div>

  </div>

  <!-- Bottom highlight -->
  <div style="
    background: #2E1566;
    border-radius: 12px;
    padding: 20px 28px;
    margin-top: 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  ">
    <div style="
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    ">
      <span style="color: white; font-size: 16px;">✓</span>
    </div>
    <p style="
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,0.9);
      line-height: 1.6;
    ">모유수유 중에도 안심하고 복용할 수 있는 천연 한약재로 처방합니다</p>
  </div>
</div>
</body>
</html>
