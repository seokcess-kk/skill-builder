<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro - 원장 소개</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div style="
  width: 680px;
  min-height: 480px;
  background: #FAFAFA;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 56px 60px;
  position: relative;
">
  <!-- Top accent line -->
  <div style="
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #7435FF, #9B6BFF);
  "></div>

  <!-- Section label -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #7435FF;
    letter-spacing: 2px;
    margin-bottom: 20px;
  ">DOCTOR PROFILE</p>

  <!-- Doctor name -->
  <h2 style="
    font-family: 'Noto Serif KR', serif;
    font-size: 32px;
    font-weight: 700;
    color: #1A1A1A;
    margin-bottom: 8px;
    line-height: 1.3;
  ">박지영 원장</h2>

  <!-- Specialty badge -->
  <div style="
    display: inline-block;
    background: rgba(116, 53, 255, 0.08);
    border: 1px solid rgba(116, 53, 255, 0.15);
    border-radius: 20px;
    padding: 6px 16px;
    margin-bottom: 28px;
  ">
    <span style="
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #7435FF;
    ">여성 비만 전문</span>
  </div>

  <!-- Divider -->
  <div style="
    width: 100%;
    height: 1px;
    background: #E8E8E8;
    margin-bottom: 28px;
  "></div>

  <!-- Description -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: #444444;
    line-height: 1.8;
    margin-bottom: 32px;
  ">
    출산 후 여성의 몸은 임신 전과 완전히 다릅니다.<br>
    호르몬 밸런스가 무너진 상태에서 무리한 다이어트는<br>
    오히려 체중 증가와 건강 악화를 부릅니다.
  </p>

  <!-- Expertise items -->
  <div style="display: flex; gap: 16px;">
    <div style="
      flex: 1;
      background: #FFFFFF;
      border: 1px solid #EEEEEE;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    ">
      <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 24px; font-weight: 700; color: #7435FF; margin-bottom: 6px;">산후</p>
      <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: #888;">체형 관리</p>
    </div>
    <div style="
      flex: 1;
      background: #FFFFFF;
      border: 1px solid #EEEEEE;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    ">
      <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 24px; font-weight: 700; color: #7435FF; margin-bottom: 6px;">호르몬</p>
      <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: #888;">맞춤 처방</p>
    </div>
    <div style="
      flex: 1;
      background: #FFFFFF;
      border: 1px solid #EEEEEE;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    ">
      <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 24px; font-weight: 700; color: #7435FF; margin-bottom: 6px;">1:1</p>
      <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: #888;">맞춤 진료</p>
    </div>
  </div>

  <!-- Clinic name bottom -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    color: #BBBBBB;
    text-align: right;
    margin-top: 28px;
    letter-spacing: 1px;
  ">다이트한의원 서면점</p>
</div>
</body>
</html>
