<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why - 원인 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div style="
  width: 680px;
  min-height: 540px;
  background: #F5F2FF;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 56px 60px;
  position: relative;
">
  <!-- Section label -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #7435FF;
    letter-spacing: 2px;
    margin-bottom: 16px;
  ">WHY</p>

  <!-- Headline -->
  <h2 style="
    font-family: 'Noto Serif KR', serif;
    font-size: 26px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.5;
    margin-bottom: 12px;
  ">산후 체중이 안 빠지는<br>진짜 이유</h2>

  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 36px;
  ">출산 후 호르몬 변화가 체중 감량을 방해합니다</p>

  <!-- Cause cards -->
  <div style="display: flex; flex-direction: column; gap: 20px;">

    <!-- Cause 1 -->
    <div style="
      background: #FFFFFF;
      border-radius: 16px;
      padding: 24px 28px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
      box-shadow: 0 2px 8px rgba(116, 53, 255, 0.06);
    ">
      <div style="
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #7435FF, #9B6BFF);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      ">
        <span style="color: white; font-family: 'Noto Sans KR', sans-serif; font-size: 18px; font-weight: 700;">01</span>
      </div>
      <div>
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700; color: #1A1A1A; margin-bottom: 6px;">에스트로겐 급감</p>
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: #666; line-height: 1.7;">출산 후 에스트로겐이 급격히 떨어지면서 지방 분해 능력이 저하되고, 특히 하복부와 허벅지에 지방이 축적됩니다.</p>
      </div>
    </div>

    <!-- Cause 2 -->
    <div style="
      background: #FFFFFF;
      border-radius: 16px;
      padding: 24px 28px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
      box-shadow: 0 2px 8px rgba(116, 53, 255, 0.06);
    ">
      <div style="
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #7435FF, #9B6BFF);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      ">
        <span style="color: white; font-family: 'Noto Sans KR', sans-serif; font-size: 18px; font-weight: 700;">02</span>
      </div>
      <div>
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700; color: #1A1A1A; margin-bottom: 6px;">기초대사량 저하</p>
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: #666; line-height: 1.7;">임신 중 변화된 신체 구성과 수면 부족으로 기초대사량이 떨어져 같은 양을 먹어도 살이 찌게 됩니다.</p>
      </div>
    </div>

    <!-- Cause 3 -->
    <div style="
      background: #FFFFFF;
      border-radius: 16px;
      padding: 24px 28px;
      display: flex;
      align-items: flex-start;
      gap: 20px;
      box-shadow: 0 2px 8px rgba(116, 53, 255, 0.06);
    ">
      <div style="
        width: 48px;
        height: 48px;
        background: linear-gradient(135deg, #7435FF, #9B6BFF);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      ">
        <span style="color: white; font-family: 'Noto Sans KR', sans-serif; font-size: 18px; font-weight: 700;">03</span>
      </div>
      <div>
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700; color: #1A1A1A; margin-bottom: 6px;">수분 대사 장애</p>
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: #666; line-height: 1.7;">호르몬 불균형으로 체내 수분 순환이 원활하지 않아 부종이 지속되고 체중이 정체됩니다.</p>
      </div>
    </div>

  </div>
</div>
</body>
</html>
