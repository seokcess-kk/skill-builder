<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pain - 고민 공감</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div style="
  width: 680px;
  min-height: 520px;
  background: #FFFFFF;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 56px 60px;
  position: relative;
">
  <!-- Section label -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #7435FF;
    letter-spacing: 2px;
    margin-bottom: 16px;
  ">PAIN POINT</p>

  <!-- Headline -->
  <h2 style="
    font-family: 'Noto Serif KR', serif;
    font-size: 26px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.5;
    margin-bottom: 36px;
  ">혹시 이런 고민,<br>하고 계시지 않나요?</h2>

  <!-- Pain points -->
  <div style="display: flex; flex-direction: column; gap: 16px;">

    <div style="
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: #F8F6FF;
      border-left: 3px solid #7435FF;
      border-radius: 0 12px 12px 0;
      padding: 20px 24px;
    ">
      <span style="font-size: 20px; flex-shrink: 0; margin-top: 2px;">😔</span>
      <div>
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 500; color: #1A1A1A; margin-bottom: 4px;">출산 후 6개월이 지났는데도 체중이 그대로</p>
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: #888; line-height: 1.5;">임신 전 옷이 하나도 맞지 않아요</p>
      </div>
    </div>

    <div style="
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: #F8F6FF;
      border-left: 3px solid #7435FF;
      border-radius: 0 12px 12px 0;
      padding: 20px 24px;
    ">
      <span style="font-size: 20px; flex-shrink: 0; margin-top: 2px;">😩</span>
      <div>
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 500; color: #1A1A1A; margin-bottom: 4px;">식단 조절해도 하체만 그대로</p>
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: #888; line-height: 1.5;">윗몸은 빠지는데 하체는 꿈쩍도 안 해요</p>
      </div>
    </div>

    <div style="
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: #F8F6FF;
      border-left: 3px solid #7435FF;
      border-radius: 0 12px 12px 0;
      padding: 20px 24px;
    ">
      <span style="font-size: 20px; flex-shrink: 0; margin-top: 2px;">😟</span>
      <div>
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 500; color: #1A1A1A; margin-bottom: 4px;">모유수유 중이라 다이어트약이 걱정</p>
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: #888; line-height: 1.5;">아이에게 영향 없는 안전한 방법이 필요해요</p>
      </div>
    </div>

    <div style="
      display: flex;
      align-items: flex-start;
      gap: 16px;
      background: #F8F6FF;
      border-left: 3px solid #7435FF;
      border-radius: 0 12px 12px 0;
      padding: 20px 24px;
    ">
      <span style="font-size: 20px; flex-shrink: 0; margin-top: 2px;">😥</span>
      <div>
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 500; color: #1A1A1A; margin-bottom: 4px;">피로와 부종이 심해 운동할 엄두가 안 나요</p>
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: #888; line-height: 1.5;">육아와 체력 저하로 몸이 무겁기만 합니다</p>
      </div>
    </div>

  </div>

  <!-- Bottom message -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: #7435FF;
    text-align: center;
    margin-top: 32px;
    font-weight: 500;
  ">이 모든 고민, 원인은 하나입니다 ↓</p>
</div>
</body>
</html>
