<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hook - 서면산후다이어트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div style="
  width: 680px;
  min-height: 480px;
  background: linear-gradient(160deg, #2E1566 0%, #7435FF 50%, #9B6BFF 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 60px 50px;
  position: relative;
  overflow: hidden;
">
  <!-- Decorative circles -->
  <div style="
    position: absolute;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
  "></div>
  <div style="
    position: absolute;
    bottom: -40px;
    left: -40px;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
  "></div>

  <!-- Quote mark -->
  <div style="
    font-family: 'Noto Serif KR', serif;
    font-size: 72px;
    color: rgba(255,255,255,0.2);
    line-height: 1;
    margin-bottom: 10px;
  ">"</div>

  <!-- Main quote -->
  <p style="
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
    font-weight: 700;
    color: #FFFFFF;
    text-align: center;
    line-height: 1.6;
    letter-spacing: -0.5px;
    margin-bottom: 24px;
  ">
    출산 후 살이 안 빠지는 건<br>
    의지의 문제가 아닙니다
  </p>

  <!-- Sub text -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 300;
    color: rgba(255,255,255,0.75);
    text-align: center;
    line-height: 1.7;
  ">
    호르몬이 변한 몸에는,<br>
    호르몬에 맞춘 처방이 필요합니다.
  </p>

  <!-- Divider -->
  <div style="
    width: 40px;
    height: 2px;
    background: rgba(255,255,255,0.4);
    margin: 32px 0 24px;
  "></div>

  <!-- Clinic name -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
  ">다이트한의원 서면점</p>
</div>
</body>
</html>
