<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proof - 후기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div style="
  width: 680px;
  min-height: 520px;
  background: #FAFAFA;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 56px 60px;
  position: relative;
">
  <!-- Section label -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #7435FF;
    letter-spacing: 2px;
    margin-bottom: 16px;
  ">REAL REVIEWS</p>

  <!-- Headline -->
  <h2 style="
    font-family: 'Noto Serif KR', serif;
    font-size: 26px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.5;
    margin-bottom: 36px;
  ">산후 다이어트,<br>이렇게 달라졌어요</h2>

  <!-- Testimonial cards -->
  <div style="display: flex; flex-direction: column; gap: 16px;">

    <!-- Review 1 -->
    <div style="
      background: #FFFFFF;
      border-radius: 16px;
      padding: 28px;
      border: 1px solid #F0ECFF;
      position: relative;
    ">
      <div style="
        position: absolute;
        top: 20px;
        right: 24px;
        font-family: 'Noto Serif KR', serif;
        font-size: 48px;
        color: rgba(116, 53, 255, 0.08);
        line-height: 1;
      ">"</div>
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 14px;">
        <div style="
          width: 40px;
          height: 40px;
          background: linear-gradient(135deg, #E8E0FF, #D0C4FF);
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
        ">
          <span style="font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700; color: #7435FF;">A</span>
        </div>
        <div>
          <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 600; color: #1A1A1A;">30대 / 출산 후 8개월</p>
          <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: #7435FF; font-weight: 500;">3개월 -9kg 감량</p>
        </div>
      </div>
      <p style="
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 14px;
        color: #555;
        line-height: 1.7;
      ">모유수유 중이라 걱정했는데, 한약이라 안심이 됐어요. 특히 하체 부종이 빠지면서 체형이 눈에 띄게 달라졌습니다.</p>
    </div>

    <!-- Review 2 -->
    <div style="
      background: #FFFFFF;
      border-radius: 16px;
      padding: 28px;
      border: 1px solid #F0ECFF;
      position: relative;
    ">
      <div style="
        position: absolute;
        top: 20px;
        right: 24px;
        font-family: 'Noto Serif KR', serif;
        font-size: 48px;
        color: rgba(116, 53, 255, 0.08);
        line-height: 1;
      ">"</div>
      <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 14px;">
        <div style="
          width: 40px;
          height: 40px;
          background: linear-gradient(135deg, #E8E0FF, #D0C4FF);
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
        ">
          <span style="font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 700; color: #7435FF;">B</span>
        </div>
        <div>
          <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 600; color: #1A1A1A;">30대 / 둘째 출산 후</p>
          <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: #7435FF; font-weight: 500;">2개월 -7kg 감량</p>
        </div>
      </div>
      <p style="
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 14px;
        color: #555;
        line-height: 1.7;
      ">첫째 때는 혼자 다이어트하다가 요요가 왔는데, 이번에는 체질에 맞는 한약으로 건강하게 빠져서 컨디션도 좋아졌어요.</p>
    </div>

  </div>

  <!-- Disclaimer for reviews -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    color: #BBB;
    text-align: center;
    margin-top: 20px;
  ">* 개인에 따라 결과가 다를 수 있으며, 위 후기는 개인의 경험입니다.</p>
</div>
</body>
</html>
