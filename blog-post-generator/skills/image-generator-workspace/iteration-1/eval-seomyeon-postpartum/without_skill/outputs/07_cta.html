<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTA - 상담 유도</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
</style>
</head>
<body>
<div style="
  width: 680px;
  min-height: 480px;
  background: linear-gradient(160deg, #2E1566 0%, #7435FF 60%, #9B6BFF 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 56px 60px;
  position: relative;
  overflow: hidden;
">
  <!-- Decorative elements -->
  <div style="
    position: absolute;
    top: 40px;
    left: 40px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
  "></div>
  <div style="
    position: absolute;
    bottom: 30px;
    right: 30px;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.06);
  "></div>

  <!-- Headline -->
  <h2 style="
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
    font-weight: 700;
    color: #FFFFFF;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 16px;
  ">출산 후 체형 고민,<br>혼자 고민하지 마세요</h2>

  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    color: rgba(255,255,255,0.7);
    text-align: center;
    line-height: 1.7;
    margin-bottom: 36px;
  ">박지영 원장이 체질과 호르몬 상태를 분석하여<br>나에게 맞는 산후 다이어트 플랜을 설계해 드립니다.</p>

  <!-- CTA Button -->
  <div style="
    background: #FFFFFF;
    border-radius: 60px;
    padding: 18px 48px;
    margin-bottom: 20px;
    cursor: pointer;
  ">
    <p style="
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: #7435FF;
      text-align: center;
    ">무료 상담 예약하기</p>
  </div>

  <!-- Contact info -->
  <div style="
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  ">
    <p style="
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
    ">전화 상담도 가능합니다</p>

    <div style="
      display: flex;
      align-items: center;
      gap: 24px;
    ">
      <div style="
        background: rgba(255,255,255,0.12);
        border-radius: 8px;
        padding: 10px 20px;
      ">
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: rgba(255,255,255,0.8);">
          <span style="margin-right: 6px;">📞</span> 전화 상담
        </p>
      </div>
      <div style="
        background: rgba(255,255,255,0.12);
        border-radius: 8px;
        padding: 10px 20px;
      ">
        <p style="font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: rgba(255,255,255,0.8);">
          <span style="margin-right: 6px;">💬</span> 카카오톡 상담
        </p>
      </div>
    </div>
  </div>

  <!-- Divider -->
  <div style="
    width: 40px;
    height: 1px;
    background: rgba(255,255,255,0.2);
    margin: 28px 0 16px;
  "></div>

  <!-- Clinic info -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
  ">다이트한의원 서면점</p>
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    margin-top: 4px;
  ">daeatdiet.com</p>
</div>
</body>
</html>
