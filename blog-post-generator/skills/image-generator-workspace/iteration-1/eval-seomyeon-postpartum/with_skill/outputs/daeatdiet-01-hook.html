<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=680">
<title>다이트한의원 서면점 - Hook</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 680px;
  margin: 0;
  font-family: 'Noto Sans CJK KR', sans-serif;
  -webkit-font-smoothing: antialiased;
  word-break: keep-all;
}

:root {
  --_original-primary: #7435FF;
  --_original-accent:  #2E1566;
  --brand-primary:  #7435FF;
  --brand-accent:   #2E1566;
  --brand-mid:      #5128B3;
  --text-dark:      #1A1A1A;
  --text-body:      #2D2D2D;
  --text-sub:       #5A5363;
  --text-muted:     #8C8494;
  --text-light:     #9A93A3;
  --bg-tint:        #F9F8FC;
  --bg-warm:        #F5F3F9;
  --bg-white:       #FFFFFF;
  --bg-dark:        #2E1566;
  --border-soft:    #EDEBF2;
  --border-faint:   #E4E0EC;
}

/* Neutral mode */
body.accent-neutral {
  --bg-tint:      #F7F7F8;
  --bg-warm:      #F3F3F4;
  --bg-dark:      #2D2D2D;
  --border-soft:  #E8E8E8;
  --border-faint: #DEDEDE;
  --text-sub:     #666666;
  --text-muted:   #999999;
  --text-light:   #AAAAAA;
}

/* Hook-E */
.hook {
  min-height: 540px; position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.hook.hook-e {
  padding: 100px 70px 90px;
  background: var(--bg-white);
  min-height: 580px;
}
.hook.hook-e .he-content {
  text-align: center;
  max-width: 520px;
}
.hook.hook-e .hook-headline.he-single {
  font-family: 'Noto Serif CJK KR', serif;
  font-size: 28px; font-weight: 400;
  color: var(--text-dark); line-height: 2.2;
  word-break: keep-all; letter-spacing: -0.3px;
}
.hook.hook-e .hook-headline.he-single em {
  font-style: normal; color: var(--brand-primary); font-weight: 600;
}
.hook.hook-e .he-bottom-line {
  width: 24px; height: 1px;
  background: var(--brand-primary); opacity: 0.25;
  margin: 48px auto 0;
}
</style>
</head>
<body class="accent-neutral">

<div class="hook hook-e">
  <div class="he-content">
    <h1 class="hook-headline he-single">
      "출산 후 달라진 몸,<br>
      <em>호르몬이 바뀌면<br>
      다이어트도 달라져야 합니다</em>"
    </h1>
  </div>
  <div class="he-bottom-line"></div>
</div>

</body>
</html>
