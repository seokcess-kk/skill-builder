<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro - 원장 소개</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 680px; margin: 0 auto; background: #f5f5f5; }
</style>
</head>
<body>
<div style="
  width: 680px;
  min-height: 480px;
  background: #FFFFFF;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 55px 60px;
  position: relative;
">
  <!-- Top accent bar -->
  <div style="
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, #7435FF, #9B6BFF);
  "></div>

  <!-- Section label -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #7435FF;
    letter-spacing: 2px;
    margin-bottom: 20px;
  ">DOCTOR PROFILE</p>

  <!-- Doctor name -->
  <h2 style="
    font-family: 'Noto Serif KR', serif;
    font-size: 30px;
    font-weight: 700;
    color: #1A1A2E;
    line-height: 1.4;
    margin-bottom: 8px;
  ">김민수 원장</h2>

  <!-- Title -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: #7435FF;
    margin-bottom: 28px;
  ">한방 비만 전문의 · 다이트한의원 대구점</p>

  <!-- Divider -->
  <div style="
    width: 100%;
    height: 1px;
    background: #ECECEC;
    margin-bottom: 28px;
  "></div>

  <!-- Description -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: #444;
    line-height: 1.9;
    margin-bottom: 30px;
  ">
    "직장인 환자분들을 오래 진료하며 느낀 것은,<br>
    <span style="color: #2E1566; font-weight: 700;">무리한 식단이 아닌 체질 개선이 핵심</span>이라는 것입니다.<br>
    한의학적 진단을 통해 개인별 맞춤 솔루션을 드립니다."
  </p>

  <!-- Credential tags -->
  <div style="display: flex; gap: 10px; flex-wrap: wrap;">
    <span style="
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #7435FF;
      background: rgba(116, 53, 255, 0.08);
      padding: 8px 16px;
      border-radius: 20px;
    ">한방비만학회 정회원</span>
    <span style="
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #7435FF;
      background: rgba(116, 53, 255, 0.08);
      padding: 8px 16px;
      border-radius: 20px;
    ">체질진단 전문</span>
    <span style="
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #7435FF;
      background: rgba(116, 53, 255, 0.08);
      padding: 8px 16px;
      border-radius: 20px;
    ">직장인 다이어트 특화</span>
  </div>
</div>
</body>
</html>
