<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTA - 상담 안내</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 680px; margin: 0 auto; background: #f5f5f5; }
</style>
</head>
<body>
<div style="
  width: 680px;
  min-height: 480px;
  background: linear-gradient(160deg, #7435FF 0%, #2E1566 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 55px 60px;
  position: relative;
  overflow: hidden;
">
  <!-- Decorative elements -->
  <div style="
    position: absolute;
    bottom: -30px;
    right: -30px;
    width: 200px;
    height: 200px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 50%;
  "></div>
  <div style="
    position: absolute;
    top: -20px;
    left: -20px;
    width: 140px;
    height: 140px;
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 50%;
  "></div>

  <!-- Headline -->
  <h2 style="
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
    font-weight: 700;
    color: #FFFFFF;
    text-align: center;
    line-height: 1.5;
    margin-bottom: 14px;
  ">바쁜 당신을 위한<br>첫 번째 변화, 지금 시작하세요</h2>

  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: rgba(255,255,255,0.65);
    text-align: center;
    line-height: 1.8;
    margin-bottom: 35px;
    max-width: 460px;
  ">
    김민수 원장이 직접 체질 진단부터<br>
    맞춤 감량 플랜까지 설계해 드립니다.
  </p>

  <!-- CTA Button -->
  <div style="
    background: #FFFFFF;
    border-radius: 14px;
    padding: 28px 40px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    margin-bottom: 20px;
    width: 100%;
    max-width: 460px;
  ">
    <p style="
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #888;
      margin-bottom: 10px;
    ">대구다이어트한의원 · 다이트한의원 대구점</p>
    <p style="
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #7435FF;
      letter-spacing: 1px;
      margin-bottom: 14px;
    ">1:1 무료 체질 상담</p>
    <div style="
      width: 100%;
      height: 1px;
      background: #ECECEC;
      margin-bottom: 14px;
    "></div>
    <p style="
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: #666;
      line-height: 1.8;
    ">
      전화 상담 또는 온라인 예약<br>
      <span style="color: #7435FF; font-weight: 700;">daeatdiet.com</span>
    </p>
  </div>

  <!-- Sub info -->
  <div style="display: flex; gap: 20px; align-items: center;">
    <span style="
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
    ">평일 10:00 - 20:00</span>
    <span style="
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      display: inline-block;
    "></span>
    <span style="
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
    ">토요일 10:00 - 15:00</span>
  </div>
</div>
</body>
</html>
