<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pain - 직장인의 고민</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 680px; margin: 0 auto; background: #f5f5f5; }
</style>
</head>
<body>
<div style="
  width: 680px;
  min-height: 520px;
  background: #F8F6FE;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 55px 60px;
  position: relative;
">
  <!-- Section label -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #7435FF;
    letter-spacing: 2px;
    margin-bottom: 18px;
  ">PAIN POINT</p>

  <!-- Headline -->
  <h2 style="
    font-family: 'Noto Serif KR', serif;
    font-size: 26px;
    font-weight: 700;
    color: #1A1A2E;
    line-height: 1.5;
    margin-bottom: 35px;
  ">혹시 이런 고민,<br>하고 계시진 않나요?</h2>

  <!-- Pain point cards -->
  <div style="display: flex; flex-direction: column; gap: 14px;">
    <!-- Card 1 -->
    <div style="
      background: #FFFFFF;
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(46,21,102,0.06);
    ">
      <div style="
        width: 44px; height: 44px;
        background: linear-gradient(135deg, #7435FF, #9B6BFF);
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; flex-shrink: 0;
      ">😩</div>
      <p style="
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 15px;
        font-weight: 400;
        color: #333;
        line-height: 1.6;
      ">퇴근 후 너무 피곤해서 운동은 엄두도 못 내요</p>
    </div>

    <!-- Card 2 -->
    <div style="
      background: #FFFFFF;
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(46,21,102,0.06);
    ">
      <div style="
        width: 44px; height: 44px;
        background: linear-gradient(135deg, #7435FF, #9B6BFF);
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; flex-shrink: 0;
      ">🍺</div>
      <p style="
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 15px;
        font-weight: 400;
        color: #333;
        line-height: 1.6;
      ">피할 수 없는 회식, 술자리 때문에 식단 관리가 무너져요</p>
    </div>

    <!-- Card 3 -->
    <div style="
      background: #FFFFFF;
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(46,21,102,0.06);
    ">
      <div style="
        width: 44px; height: 44px;
        background: linear-gradient(135deg, #7435FF, #9B6BFF);
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; flex-shrink: 0;
      ">🔄</div>
      <p style="
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 15px;
        font-weight: 400;
        color: #333;
        line-height: 1.6;
      ">다이어트 → 요요 → 다시 다이어트… 반복의 굴레</p>
    </div>

    <!-- Card 4 -->
    <div style="
      background: #FFFFFF;
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(46,21,102,0.06);
    ">
      <div style="
        width: 44px; height: 44px;
        background: linear-gradient(135deg, #7435FF, #9B6BFF);
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
        font-size: 20px; flex-shrink: 0;
      ">⏰</div>
      <p style="
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 15px;
        font-weight: 400;
        color: #333;
        line-height: 1.6;
      ">불규칙한 식사 시간, 야식의 유혹을 이길 수가 없어요</p>
    </div>
  </div>
</div>
</body>
</html>
