<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hook - 직장인 다이어트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 680px; margin: 0 auto; background: #f5f5f5; }
</style>
</head>
<body>
<div style="
  width: 680px;
  min-height: 480px;
  background: linear-gradient(160deg, #2E1566 0%, #7435FF 50%, #9B6BFF 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 60px 50px;
  position: relative;
  overflow: hidden;
">
  <!-- Decorative circles -->
  <div style="
    position: absolute;
    top: -60px;
    right: -60px;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
  "></div>
  <div style="
    position: absolute;
    bottom: -40px;
    left: -40px;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  "></div>

  <!-- Quote mark -->
  <div style="
    font-family: 'Georgia', serif;
    font-size: 80px;
    color: rgba(255,255,255,0.2);
    line-height: 1;
    margin-bottom: 10px;
  ">"</div>

  <!-- Main quote -->
  <p style="
    font-family: 'Noto Serif KR', serif;
    font-size: 32px;
    font-weight: 700;
    color: #FFFFFF;
    text-align: center;
    line-height: 1.6;
    letter-spacing: -0.5px;
    margin-bottom: 20px;
  ">
    퇴근하면 녹초인데,<br>
    다이어트까지 해야 하나요?
  </p>

  <!-- Sub text -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 17px;
    font-weight: 300;
    color: rgba(255,255,255,0.75);
    text-align: center;
    line-height: 1.8;
    max-width: 480px;
  ">
    야근, 회식, 불규칙한 식사…<br>
    바쁜 직장인에게 맞는 다이어트 방법이 따로 있습니다.
  </p>

  <!-- Divider -->
  <div style="
    width: 40px;
    height: 3px;
    background: rgba(255,255,255,0.4);
    margin: 30px 0 20px;
    border-radius: 2px;
  "></div>

  <!-- Brand -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
  ">다이트한의원 대구점</p>
</div>
</body>
</html>
