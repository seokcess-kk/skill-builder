<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proof - 후기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 680px; margin: 0 auto; background: #f5f5f5; }
</style>
</head>
<body>
<div style="
  width: 680px;
  min-height: 520px;
  background: #F8F6FE;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 50px 55px;
  position: relative;
">
  <!-- Section label -->
  <p style="
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: #7435FF;
    letter-spacing: 2px;
    margin-bottom: 18px;
  ">REAL REVIEWS</p>

  <!-- Headline -->
  <h2 style="
    font-family: 'Noto Serif KR', serif;
    font-size: 26px;
    font-weight: 700;
    color: #1A1A2E;
    line-height: 1.5;
    margin-bottom: 30px;
  ">직장인 환자분들의<br>실제 후기</h2>

  <!-- Review cards -->
  <div style="display: flex; flex-direction: column; gap: 16px;">
    <!-- Review 1 -->
    <div style="
      background: #FFFFFF;
      border-radius: 14px;
      padding: 26px 28px;
      box-shadow: 0 2px 12px rgba(46,21,102,0.06);
      position: relative;
    ">
      <div style="
        position: absolute;
        top: -1px;
        left: 28px;
        width: 40px;
        height: 3px;
        background: #7435FF;
        border-radius: 0 0 2px 2px;
      "></div>
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
        <span style="
          font-family: 'Noto Sans KR', sans-serif;
          font-size: 14px;
          font-weight: 700;
          color: #1A1A2E;
        ">30대 여성 · 사무직</span>
        <span style="font-size: 14px; color: #FFB800;">&#9733;&#9733;&#9733;&#9733;&#9733;</span>
      </div>
      <p style="
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 15px;
        font-weight: 400;
        color: #444;
        line-height: 1.8;
      ">"야근이 많아서 운동할 시간이 없었는데, 한약과 침 치료만으로 <span style="color: #7435FF; font-weight: 700;">3개월 만에 8kg 감량</span>했어요. 무엇보다 요요가 안 와서 놀랐습니다."</p>
    </div>

    <!-- Review 2 -->
    <div style="
      background: #FFFFFF;
      border-radius: 14px;
      padding: 26px 28px;
      box-shadow: 0 2px 12px rgba(46,21,102,0.06);
      position: relative;
    ">
      <div style="
        position: absolute;
        top: -1px;
        left: 28px;
        width: 40px;
        height: 3px;
        background: #9B6BFF;
        border-radius: 0 0 2px 2px;
      "></div>
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
        <span style="
          font-family: 'Noto Sans KR', sans-serif;
          font-size: 14px;
          font-weight: 700;
          color: #1A1A2E;
        ">40대 남성 · 영업직</span>
        <span style="font-size: 14px; color: #FFB800;">&#9733;&#9733;&#9733;&#9733;&#9733;</span>
      </div>
      <p style="
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 15px;
        font-weight: 400;
        color: #444;
        line-height: 1.8;
      ">"회식이 잦아 걱정했는데 회식 때 대처법까지 알려주셔서 좋았어요. <span style="color: #7435FF; font-weight: 700;">뱃살이 확실히 줄고</span> 소화도 편해졌습니다."</p>
    </div>

    <!-- Review 3 -->
    <div style="
      background: #FFFFFF;
      border-radius: 14px;
      padding: 26px 28px;
      box-shadow: 0 2px 12px rgba(46,21,102,0.06);
      position: relative;
    ">
      <div style="
        position: absolute;
        top: -1px;
        left: 28px;
        width: 40px;
        height: 3px;
        background: #B794FF;
        border-radius: 0 0 2px 2px;
      "></div>
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
        <span style="
          font-family: 'Noto Sans KR', sans-serif;
          font-size: 14px;
          font-weight: 700;
          color: #1A1A2E;
        ">30대 남성 · IT 개발직</span>
        <span style="font-size: 14px; color: #FFB800;">&#9733;&#9733;&#9733;&#9733;&#9734;</span>
      </div>
      <p style="
        font-family: 'Noto Sans KR', sans-serif;
        font-size: 15px;
        font-weight: 400;
        color: #444;
        line-height: 1.8;
      ">"밤샘 작업이 잦은데, 체질에 맞는 야식 대안까지 제안해주셔서 실천 가능했습니다. <span style="color: #7435FF; font-weight: 700;">4개월 만에 12kg 감량</span> 성공!"</p>
    </div>
  </div>
</div>
</body>
</html>
