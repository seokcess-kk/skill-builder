<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=680">
<title>다이트한의원 대구점 — Bridge (Why → Solution)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 680px;
  margin: 0;
  font-family: 'Noto Sans CJK KR', 'Malgun Gothic', sans-serif;
  -webkit-font-smoothing: antialiased;
  word-break: keep-all;
}

:root {
  --brand-primary:  #7435FF;
  --brand-accent:   #2E1566;
  --bg-tint:        #F9F7FF;
  --border-soft:    #EDEBF2;
}

.bridge { width: 100%; position: relative; overflow: hidden; }

.bridge.bridge-a {
  padding: 48px 60px;
  background: var(--bg-tint);
  text-align: center;
}
.ba-rule {
  width: 100%; height: 1px;
  background: var(--border-soft);
  margin-bottom: 28px;
}
.ba-rule-bottom { margin-top: 28px; margin-bottom: 0; }
.bridge-text {
  font-family: 'Noto Serif CJK KR', serif;
  font-size: 19px; font-weight: 500;
  color: var(--brand-primary); line-height: 1.9;
}
.bridge-text em { font-style: normal; color: var(--brand-accent); font-weight: 600; }
</style>
</head>
<body>

<div class="bridge bridge-a">
  <div class="ba-rule"></div>
  <p class="bridge-text">
    원인을 알았다면,<br>
    이제 <em>방법을 바꿀 차례</em>입니다
  </p>
  <div class="ba-rule ba-rule-bottom"></div>
</div>

</body>
</html>
