<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card {
  width: 680px;
  min-height: 480px;
  background: linear-gradient(160deg, #2E1566 0%, #7435FF 60%, #9B6DFF 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 64px 56px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: -80px;
  right: -80px;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
}
.card::after {
  content: '';
  position: absolute;
  bottom: -60px;
  left: -60px;
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.quote-mark {
  font-family: 'Noto Serif KR', serif;
  font-size: 72px;
  color: rgba(255,255,255,0.25);
  line-height: 1;
  margin-bottom: 8px;
}
.hook-text {
  font-family: 'Noto Serif KR', serif;
  font-size: 28px;
  font-weight: 700;
  color: #FFFFFF;
  text-align: center;
  line-height: 1.6;
  letter-spacing: -0.5px;
  position: relative;
  z-index: 1;
}
.hook-text em {
  font-style: normal;
  color: #FFD966;
  font-weight: 900;
}
.sub-text {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 16px;
  font-weight: 400;
  color: rgba(255,255,255,0.7);
  text-align: center;
  margin-top: 28px;
  line-height: 1.6;
  position: relative;
  z-index: 1;
}
.divider {
  width: 48px;
  height: 2px;
  background: rgba(255,255,255,0.3);
  margin: 24px auto 0;
  position: relative;
  z-index: 1;
}
</style>
</head>
<body>
<div class="card">
  <div class="quote-mark">"</div>
  <p class="hook-text">
    40대 이후,<br>
    <em>같은 식단인데 살이 찌는 이유</em>가<br>
    따로 있습니다
  </p>
  <p class="sub-text">
    갱년기 체중 증가는 의지의 문제가 아닙니다
  </p>
  <div class="divider"></div>
</div>
</body>
</html>
