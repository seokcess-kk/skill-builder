<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card {
  width: 680px;
  min-height: 520px;
  background: #FAFAFA;
  display: flex;
  flex-direction: column;
  padding: 56px;
  position: relative;
}
.section-tag {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: #E04848;
  letter-spacing: 1.5px;
  margin-bottom: 16px;
}
.section-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 26px;
  font-weight: 700;
  color: #1a1a1a;
  line-height: 1.5;
  margin-bottom: 36px;
}
.section-title em {
  font-style: normal;
  color: #E04848;
}
.pain-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.pain-item {
  display: flex;
  align-items: center;
  gap: 20px;
  background: #FFFFFF;
  border-radius: 14px;
  padding: 22px 28px;
  border-left: 4px solid #E04848;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.pain-number {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: #E04848;
  background: rgba(224, 72, 72, 0.08);
  width: 32px;
  height: 32px;
  min-width: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pain-text {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 16px;
  font-weight: 500;
  color: #333;
  line-height: 1.5;
}
.pain-text strong {
  color: #1a1a1a;
  font-weight: 700;
}
</style>
</head>
<body>
<div class="card">
  <div class="section-tag">PROBLEM</div>
  <h2 class="section-title">
    혹시 이런 고민,<br>
    <em>나만 겪는 걸까요?</em>
  </h2>
  <div class="pain-list">
    <div class="pain-item">
      <div class="pain-number">1</div>
      <p class="pain-text"><strong>먹는 양은 그대론데</strong> 체중이 계속 늘어요</p>
    </div>
    <div class="pain-item">
      <div class="pain-number">2</div>
      <p class="pain-text"><strong>운동을 해도</strong> 예전처럼 빠지지 않아요</p>
    </div>
    <div class="pain-item">
      <div class="pain-number">3</div>
      <p class="pain-text"><strong>복부에만</strong> 유독 살이 집중돼요</p>
    </div>
    <div class="pain-item">
      <div class="pain-number">4</div>
      <p class="pain-text"><strong>다이어트를 해도</strong> 요요가 반복돼요</p>
    </div>
  </div>
</div>
</body>
</html>
