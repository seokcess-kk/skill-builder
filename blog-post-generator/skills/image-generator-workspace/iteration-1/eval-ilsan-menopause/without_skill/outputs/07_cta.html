<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card {
  width: 680px;
  min-height: 480px;
  background: linear-gradient(160deg, #7435FF 0%, #2E1566 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 64px 56px;
  position: relative;
  overflow: hidden;
  text-align: center;
}
.card::before {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 70%);
  top: -100px; right: -100px;
}
.card::after {
  content: '';
  position: absolute;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255,255,255,0.04), transparent 70%);
  bottom: -80px; left: -80px;
}
.cta-label {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: rgba(255,255,255,0.6);
  margin-bottom: 20px;
  position: relative;
  z-index: 1;
}
.cta-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 30px;
  font-weight: 700;
  color: #FFFFFF;
  line-height: 1.5;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}
.cta-title em {
  font-style: normal;
  color: #FFD966;
}
.cta-subtitle {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 16px;
  font-weight: 400;
  color: rgba(255,255,255,0.65);
  line-height: 1.6;
  margin-bottom: 40px;
  position: relative;
  z-index: 1;
}
.cta-button {
  display: inline-block;
  background: #FFD966;
  color: #2E1566;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 17px;
  font-weight: 700;
  padding: 16px 48px;
  border-radius: 50px;
  text-decoration: none;
  box-shadow: 0 8px 24px rgba(255, 217, 102, 0.3);
  position: relative;
  z-index: 1;
  margin-bottom: 24px;
}
.cta-info {
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  z-index: 1;
}
.cta-info-item {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
}
.cta-info-item strong {
  color: rgba(255,255,255,0.8);
  font-weight: 500;
}
</style>
</head>
<body>
<div class="card">
  <div class="cta-label">다이트한의원 일산점</div>
  <h2 class="cta-title">
    체질에 맞는<br>
    <em>갱년기 다이어트</em>,<br>
    지금 시작하세요
  </h2>
  <p class="cta-subtitle">
    이정호 원장이 1:1 체질 상담으로<br>
    나에게 맞는 솔루션을 찾아드립니다
  </p>
  <div class="cta-button">무료 체질 상담 예약하기</div>
  <div class="cta-info">
    <div class="cta-info-item"><strong>홈페이지</strong> daeatdiet.com</div>
    <div class="cta-info-item"><strong>위치</strong> 경기도 고양시 일산</div>
  </div>
</div>
</body>
</html>
