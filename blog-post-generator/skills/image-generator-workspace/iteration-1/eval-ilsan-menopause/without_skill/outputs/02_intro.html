<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.card {
  width: 680px;
  min-height: 480px;
  background: #FFFFFF;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 56px;
  position: relative;
}
.accent-bar {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 5px;
  background: linear-gradient(90deg, #7435FF, #9B6DFF);
}
.clinic-label {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: #7435FF;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 20px;
}
.doctor-name {
  font-family: 'Noto Serif KR', serif;
  font-size: 32px;
  font-weight: 700;
  color: #1a1a1a;
  margin-bottom: 8px;
  line-height: 1.3;
}
.doctor-title {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 16px;
  font-weight: 500;
  color: #7435FF;
  margin-bottom: 32px;
}
.info-grid {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.info-row {
  display: flex;
  align-items: flex-start;
  gap: 16px;
}
.info-icon {
  width: 40px;
  height: 40px;
  min-width: 40px;
  background: rgba(116, 53, 255, 0.08);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}
.info-content {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.info-label {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  font-weight: 500;
  color: #999;
}
.info-value {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: #333;
  line-height: 1.5;
}
.bottom-quote {
  margin-top: 36px;
  padding-top: 24px;
  border-top: 1px solid #f0f0f0;
  font-family: 'Noto Serif KR', serif;
  font-size: 15px;
  color: #666;
  line-height: 1.7;
  font-style: italic;
}
</style>
</head>
<body>
<div class="card">
  <div class="accent-bar"></div>
  <div class="clinic-label">다이트한의원 일산점</div>
  <div class="doctor-name">이정호 원장</div>
  <div class="doctor-title">체질 한의학 전공</div>
  <div class="info-grid">
    <div class="info-row">
      <div class="info-icon">🎓</div>
      <div class="info-content">
        <span class="info-label">전문 분야</span>
        <span class="info-value">체질 한의학 기반 갱년기 체중 관리</span>
      </div>
    </div>
    <div class="info-row">
      <div class="info-icon">🔬</div>
      <div class="info-content">
        <span class="info-label">진료 철학</span>
        <span class="info-value">체질 분석을 통한 근본적 원인 치료</span>
      </div>
    </div>
    <div class="info-row">
      <div class="info-icon">📍</div>
      <div class="info-content">
        <span class="info-label">위치</span>
        <span class="info-value">경기도 고양시 일산</span>
      </div>
    </div>
  </div>
  <p class="bottom-quote">
    "같은 다이어트도 체질에 따라 방법이 달라야 합니다"
  </p>
</div>
</body>
</html>
