<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=680">
<title>다이트한의원 일산 - Bridge (Why→Solution)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 680px;
  margin: 0;
  font-family: 'Noto Sans CJK KR', 'Malgun Gothic', sans-serif;
  -webkit-font-smoothing: antialiased;
  word-break: keep-all;
}
:root {
  --_original-primary: #7435FF;
  --_original-accent:  #2E1566;
  --brand-primary:  #7435FF;
  --brand-accent:   #2E1566;
  --bg-tint:        #F9F7FF;
  --border-soft:    #EDEBF2;
}

/* Bridge-A: 라이트 + 수평선 */
.bridge { width: 100%; position: relative; overflow: hidden; }
.bridge.bridge-a {
  padding: 48px 60px;
  background: var(--bg-tint);
  text-align: center;
}
.bridge.bridge-a .ba-rule {
  width: 100%; height: 1px;
  background: var(--border-soft);
  margin-bottom: 28px;
}
.bridge.bridge-a .ba-rule-bottom { margin-top: 28px; margin-bottom: 0; }
.bridge.bridge-a .bridge-text {
  font-family: 'Noto Serif CJK KR', Georgia, serif;
  font-size: 19px; font-weight: 500;
  color: var(--brand-primary); line-height: 1.9;
}
.bridge.bridge-a .bridge-text em { font-style: normal; color: var(--brand-accent); font-weight: 600; }
</style>
</head>
<body class="accent-gradient">

<div class="bridge bridge-a">
  <div class="ba-rule"></div>
  <p class="bridge-text">
    원인을 알았다면,<br>
    이제 <em>방법을 바꿀</em> 차례입니다
  </p>
  <div class="ba-rule ba-rule-bottom"></div>
</div>

</body>
</html>
